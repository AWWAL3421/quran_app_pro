name: quran_app_pro
description: "A premium Quran app with Antique Gold aesthetic."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0' 

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  just_audio: ^0.9.41
  quran: ^1.2.9
  shared_preferences: ^2.3.5
  speech_to_text: ^7.0.0 
  permission_handler: ^11.3.1
  share_plus: ^10.1.1
  http: ^1.3.0 

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0 

flutter:
  uses-material-design: true
  
  assets:
    - assets/data/